<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A-LINE Admin</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,Arial,sans-serif;
  background:#f5f7fb;
  color:#14213d;
  padding:22px;
}
.wrap{
  max-width:1200px;
  margin:auto;
}
.header{
  margin-bottom:20px;
}
.header h1{
  font-size:28px;
  font-weight:800;
}
.header p{
  color:#64748b;
  margin-top:6px;
  font-size:14px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:18px;
}
.card,.table-card{
  background:#fff;
  border:1px solid #e8eef6;
  border-radius:22px;
  padding:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.04);
}
.stat-label{
  font-size:13px;
  color:#64748b;
}
.stat-value{
  font-size:34px;
  font-weight:800;
  color:#0b5cab;
  margin-top:6px;
}
.table-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.search{
  height:44px;
  min-width:260px;
  width:100%;
  max-width:360px;
  padding:0 14px;
  border:1px solid #dbe3ee;
  border-radius:14px;
}
.table-wrap{
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}
th,td{
  padding:14px 10px;
  border-bottom:1px solid #eef2f7;
  text-align:left;
  vertical-align:top;
}
th{
  font-size:12px;
  color:#64748b;
  text-transform:uppercase;
}
td strong{
  display:block;
  font-size:14px;
}
td small{
  font-size:12px;
  color:#64748b;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#eef7ff;
  color:#0b5cab;
  font-size:11px;
  font-weight:800;
}
.empty{
  padding:22px;
  text-align:center;
  color:#64748b;
}
@media(max-width:640px){
  body{padding:14px}
  .header h1{font-size:22px}
}
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <h1>A-LINE Admin</h1>
    <p>Rekapitulasi pengunjung real-time</p>
  </div>

  <div class="stats">
    <div class="card">
      <div class="stat-label">Total Kunjungan Hari Ini</div>
      <div class="stat-value" id="today-total">0</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-head">
      <h2>Daftar Pengunjung</h2>
      <input id="search" class="search" placeholder="Cari nama, NIK, WBP..." />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Pengunjung</th>
            <th>Alamat</th>
            <th>WBP</th>
            <th>Relasi</th>
            <th>Pengikut</th>
            <th>Waktu Daftar</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="admin-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxNR8AO5bPKNmYIgsv3k5YcYGWmZdBNC5g2KqVdVbWwDT_236vUQwAls_0DTAE9ee-umQ/exec";

let master = [];

async function getBookings() {
  const res = await fetch(API_URL);
  const data = await res.json();

  if (!Array.isArray(data)) return [];

  return data.reverse();
}

function countToday(list) {
  const now = new Date();
  const today =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0");

  return list.filter(item =>
    String(item.created_at || "").startsWith(today)
  ).length;
}

  function formatDate(value) {
  if (!value) return "-";

  const d = new Date(value);

  if (isNaN(d)) return value;

  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Jakarta",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(d);

  const get = type => parts.find(p => p.type === type)?.value || "";

  return `${get("year")}-${get("month")}-${get("day")} ${get("hour")}:${get("minute")}`;
}

function renderTable(keyword = "") {
  const body = document.getElementById("admin-body");

  const q = keyword.toLowerCase();

  const list = master.filter(item => {
    return !q || [
      item.nama,
      item.nik,
      item.wbp
    ].some(v => String(v || "").toLowerCase().includes(q));
  });

  document.getElementById("today-total").textContent = countToday(master);

  if (!list.length) {
    body.innerHTML = `<tr><td colspan="8" class="empty">Tidak ada data</td></tr>`;
    return;
  }

  body.innerHTML = list.map((item, i) => `
    <tr>
  <td>${i + 1}</td>
  <td>
    <strong>${item.nama || "-"}</strong>
    <small>${item.nik || "-"}</small>
  </td>
  <td>${item.alamat || "-"}</td>
  <td>${item.wbp || "-"}</td>
  <td>${item.relasi || "-"}</td>
  <td>
    L: ${item.pengikutLaki || 0}<br>
    P: ${item.pengikutPerempuan || 0}<br>
    A: ${item.pengikutAnak || 0}
  </td>
  <td>${formatDate(item.created_at)}</td>
  <td><span class="badge">${item.status || "-"}</span></td>
</tr>
  `).join("");
}

async function init() {
  master = await getBookings();
  renderTable();

  setInterval(async () => {
    master = await getBookings();
    renderTable(document.getElementById("search").value);
  }, 5000);
}

document.getElementById("search").addEventListener("input", e => {
  renderTable(e.target.value);
});

init();
</script>

</body>
</html>
