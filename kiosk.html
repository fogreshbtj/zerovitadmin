<!DOCTYPE html>
<html>
<head>
<title>Kiosk Scan</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
video{
  width:100%;
  max-width:500px;
  border-radius:12px;
}
#status{
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<video id="video" autoplay></video>
<div id="status">Arahkan QR ke kamera</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<canvas id="canvas" hidden></canvas>

<script>
if(localStorage.getItem("role") !== "kiosk"){
  alert("Akses ditolak");
  window.location.href = "admin.html";
}

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  video.srcObject = stream;
});

function scan(){
  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);

    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if(code){
      checkIn(code.data);
    }
  }

  requestAnimationFrame(scan);
}

scan();

function checkIn(qr){
  fetch("API_URL_KAMU", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code:qr})
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.status === "success"){
      status.innerText = "CHECK-IN BERHASIL";

      printTicket(data);

      setTimeout(()=>{
        status.innerText = "Arahkan QR ke kamera";
      },1500);

    } else {
      status.innerText = "QR tidak valid / sudah digunakan";
    }

  });
}

function printTicket(data){
  const w = window.open("","");

  w.document.write(`
    <h2>Antrian A-LINE</h2>
    <p>Nama: ${data.nama}</p>
    <p>No: ${data.queue}</p>
    <p>Waktu: ${data.time}</p>
  `);

  w.print();
}
</script>

</body>
</html>
